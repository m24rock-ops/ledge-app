<!DOCTYPE html>
<html>
<head>
  <title>Ledge - PG or(room) Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="ledge.css">
</head>
<body>
  <div class="container">
    <!-- LOGIN SECTION -->
    <div id="loginSection" class="card">
      <h1>🏠 Ledge - PG or (Room) Finder</h1>
      <label>Your Name</label>
      <input type="text" id="userName" placeholder="Enter your name">
      <label>Phone Number</label>
      <input type="tel" id="userPhone" placeholder="Enter your phone">
      <button  type ="radio"id="loginBtn">Get Started</button>
    </div>

    <!-- MAIN APP (hidden initially) -->
    <div id="mainApp" style="display:none;">
      <div class="card">
        <h1>Welcome, <span id="displayName"></span>!</h1>
        <button id="browsBtn">Browse PGs or Rooms</button>
        <button id="addBtn" style="margin-top:12px;">List Your PG or Room</button>
        <button id="logoutBtn" style="margin-top:12px;background:#dc2626;">Logout</button>
      </div>

      <!-- BROWSE PGs -->
      <div id="browseSection" style="display:none;">
        <div class="card">
          <label>Filter Property</label>
          <select id="filterType">
            <option value="all">All</option>
            <option value="PG">PG</option>
            <option value="Room">Room</option>
          </select>
          <h2>Available properties</h2>
          <div id="pgList">Loading...</div>
        </div>
      </div>

      <!-- ADD PG FORM -->
      <div id="addSection" style="display:none;">
        <div class="card">
          <h2>List Your PG</h2>

          <label>Property Type</label>
          <select id="propertyType">
            <option value="">Select</option>
            <option value="PG">PG</option>
            <option value="Room">Room</option>
          </select>

          <label>PG Name</label>
          <input type="text" id="pgName" placeholder="e.g. Sunrise PG">

          <label>Monthly Rent (₹)</label>
          <input type="number" id="pgPrice" placeholder="e.g. 6000" step="500">

          <label>Location</label>
          <input type="text" id="pgLocation" placeholder="e.g. Koramangala, Bengaluru">

          <label>Room Type</label>
          <select id="pgType">
            <option value="">Select</option>
            <option value="1 Sharing">1 Sharing</option>
            <option value="2 Sharing">2 Sharing</option>
            <option value="3 Sharing">3 Sharing</option>
          </select>

          <label>Contact Number</label>
          <input type="tel" id="pgContact" placeholder="Your phone number">

          <label>Property Photo</label>
          <input type="file" id="pgImage" accept="image/*">

          <button id="submitBtn">List Your PG</button>
          <button id="backBtn" style="margin-top:12px;background:#6b7280;">Back</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="ledge.js"></script>
</body>
</html>
